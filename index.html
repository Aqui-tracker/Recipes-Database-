<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aqui Cal-Mex · Bar Recipes</title>
<style>
:root {
  --bg:    #0d0d0d;
  --bg2:   #141414;
  --bg3:   #1c1c1c;
  --bg4:   #232323;
  --bg5:   #2a2a2a;
  --gold:  #c9a84c;
  --gold2: #e0bc6a;
  --text:  #f0ece4;
  --muted: #7a7a7a;
  --dim:   #4a4a4a;
  --border:#242424;
  --red:   #c44040;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}

/* ── HEADER ── */
header{background:var(--bg2);border-bottom:2px solid var(--gold);padding:14px 24px;position:sticky;top:0;z-index:300}
.hdr{max-width:1300px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:12px}
.brand-logo{font-size:1.6rem;line-height:1}
.brand-text h1{font-size:1.15rem;color:var(--gold);font-weight:700;letter-spacing:.04em;line-height:1.2}
.brand-text p{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;margin-top:2px}
.hdr-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:.8rem;font-weight:600;transition:all .15s;font-family:inherit;white-space:nowrap}
.btn-gold{background:var(--gold);color:#0d0d0d}
.btn-gold:hover{background:var(--gold2)}
.btn-outline{background:transparent;color:var(--gold);border:1px solid var(--gold)}
.btn-outline:hover{background:rgba(201,168,76,.1)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--dim)}
.btn-red{background:transparent;color:var(--red);border:1px solid var(--red)}
.btn-red:hover{background:rgba(196,64,64,.1)}
.btn-sm{padding:4px 10px;font-size:.74rem}

/* ── TABS ── */
.tab-bar-wrap{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:58px;z-index:200}
.tab-bar{max-width:1300px;margin:0 auto;padding:0 24px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab{padding:13px 18px;font-size:.8rem;font-weight:600;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit;letter-spacing:.02em}
.tab:hover{color:var(--text)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab .cnt{display:inline-block;background:var(--bg4);border-radius:10px;padding:1px 7px;font-size:.65rem;margin-left:5px;color:var(--muted)}
.tab.active .cnt{background:rgba(201,168,76,.2);color:var(--gold)}

/* ── MAIN ── */
.main{max-width:1300px;margin:0 auto;padding:22px 22px 70px}

/* ── SECTION HEADER ── */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.section-hdr-left{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.section-title{font-size:1.1rem;font-weight:700;color:var(--text)}
.section-sub{font-size:.76rem;color:var(--muted)}
.search-wrap{position:relative}
.search-wrap input{padding:7px 12px 7px 34px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.82rem;font-family:inherit;width:220px}
.search-wrap input:focus{outline:none;border-color:var(--gold);width:260px}
.search-wrap input{transition:width .2s}
.s-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem;pointer-events:none}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}

/* ── CARD ── */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:15px;cursor:pointer;transition:border-color .15s,transform .15s,box-shadow .15s;display:flex;flex-direction:column}
.card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 4px 20px rgba(201,168,76,.1)}
.card-name{font-size:.88rem;font-weight:600;line-height:1.35;margin-bottom:6px;flex:1}
.card-yield{font-size:.72rem;color:var(--muted);margin-bottom:8px}
.card-ings{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:10px}
.card-ings span{background:var(--bg4);border-radius:3px;padding:1px 6px;font-size:.68rem;color:var(--dim)}
.card-ings .tag-more{color:var(--gold);background:rgba(201,168,76,.08);border-radius:3px;padding:1px 6px;font-size:.68rem}
.card-footer{padding-top:9px;border-top:1px solid var(--border);display:flex;gap:5px}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted);grid-column:1/-1}
.empty-icon{font-size:2.5rem;margin-bottom:10px;opacity:.25}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.87);z-index:500;overflow-y:auto;padding:20px}
.overlay.open{display:flex;align-items:flex-start;justify-content:center}
.modal{background:var(--bg4);border:1px solid var(--border);border-radius:12px;width:100%;max-width:740px;margin:auto}
.mhdr{padding:17px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mhdr h2{font-size:.95rem;color:var(--gold);font-weight:700}
.mx{background:none;border:none;color:var(--muted);font-size:1.35rem;cursor:pointer;line-height:1;padding:0 2px}
.mx:hover{color:var(--text)}
.mbody{padding:22px}
.mftr{padding:13px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}

/* ── RECIPE VIEW ── */
.view-name{font-size:1.3rem;font-weight:700;margin-bottom:7px;line-height:1.3}
.view-meta{display:flex;flex-wrap:wrap;gap:14px;font-size:.76rem;color:var(--muted);margin-bottom:18px}
.view-meta b{color:var(--text)}
.view-cols{display:grid;grid-template-columns:1fr 1fr;gap:22px}
@media(max-width:520px){.view-cols{grid-template-columns:1fr}}
.vsec h3{font-size:.66rem;text-transform:uppercase;letter-spacing:.12em;color:var(--gold);font-weight:700;margin-bottom:10px}
.ing-list{list-style:none}
.ing-list li{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:.83rem}
.ing-list li:last-child{border:none}
.ing-amt{color:var(--gold);font-weight:700;white-space:nowrap;min-width:60px}
.step-list{list-style:none;counter-reset:s}
.step-list li{counter-increment:s;position:relative;padding:6px 0 6px 28px;border-bottom:1px solid var(--border);font-size:.82rem;line-height:1.45}
.step-list li:last-child{border:none}
.step-list li::before{content:counter(s);position:absolute;left:0;top:7px;background:var(--gold);color:#0d0d0d;width:18px;height:18px;border-radius:50%;font-size:.62rem;font-weight:800;display:flex;align-items:center;justify-content:center}
.view-note{margin-top:14px;padding:9px 13px;background:rgba(201,168,76,.07);border-left:3px solid var(--gold);border-radius:0 5px 5px 0;font-size:.8rem;color:var(--muted);line-height:1.5}

/* ── FORM ── */
.fg{margin-bottom:13px}
.fg label{display:block;font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.84rem;font-family:inherit}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--gold)}
.fg textarea{min-height:66px;resize:vertical}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:11px}
@media(max-width:460px){.fg-row{grid-template-columns:1fr}}

/* ── INGREDIENT EDITOR ── */
.ie{background:var(--bg3);border:1px solid var(--border);border-radius:7px;overflow:hidden}
.ie-hdr{display:grid;grid-template-columns:72px 68px 1fr 24px;gap:6px;padding:5px 8px;background:var(--bg2)}
.ie-hdr span{font-size:.62rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:700}
.ir{display:grid;grid-template-columns:72px 68px 1fr 24px;gap:6px;padding:6px 8px;border-bottom:1px solid var(--border);align-items:center}
.ir:last-child{border:none}
.ir input{padding:5px 7px;background:var(--bg4);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:.78rem;width:100%;font-family:inherit}
.ir input:focus{outline:none;border-color:var(--gold)}
.rm{background:none;border:none;color:var(--red);cursor:pointer;font-size:.95rem;padding:2px;line-height:1;opacity:.6}
.rm:hover{opacity:1}
.ie-add{width:100%;padding:7px;background:none;border:none;border-top:1px solid var(--border);color:var(--gold);cursor:pointer;font-size:.76rem;font-weight:600;font-family:inherit}
.ie-add:hover{background:rgba(201,168,76,.05)}

/* ── STEPS EDITOR ── */
.se{background:var(--bg3);border:1px solid var(--border);border-radius:7px;overflow:hidden}
.sr{display:grid;grid-template-columns:20px 1fr 24px;gap:8px;padding:6px 8px;border-bottom:1px solid var(--border);align-items:center}
.sr:last-child{border:none}
.snum{width:18px;height:18px;background:var(--gold);color:#0d0d0d;border-radius:50%;font-size:.6rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sr input{padding:5px 7px;background:var(--bg4);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:.78rem;width:100%;font-family:inherit}
.sr input:focus{outline:none;border-color:var(--gold)}
.se-add{width:100%;padding:7px;background:none;border:none;border-top:1px solid var(--border);color:var(--gold);cursor:pointer;font-size:.76rem;font-weight:600;font-family:inherit}
.se-add:hover{background:rgba(201,168,76,.05)}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;right:22px;background:var(--bg4);border:1px solid var(--gold);color:var(--text);padding:10px 18px;border-radius:7px;font-size:.82rem;z-index:9999;transform:translateY(70px);opacity:0;transition:all .25s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}

/* ── ADMIN LOCK ── */
.lock-btn{background:transparent;color:var(--muted);border:1px solid var(--border);padding:7px 13px;border-radius:6px;font-size:.8rem;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:5px}
.lock-btn:hover{border-color:var(--gold);color:var(--gold)}
.lock-btn.unlocked{color:var(--gold);border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.07)}

/* PIN MODAL */
.pin-modal{background:var(--bg4);border:1px solid var(--border);border-radius:12px;width:100%;max-width:340px;margin:auto}
.pin-title{font-size:.95rem;color:var(--gold);font-weight:700}
.pin-input-wrap{margin:18px 0}
.pin-input-wrap input{width:100%;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:1.2rem;font-family:inherit;text-align:center;letter-spacing:.25em}
.pin-input-wrap input:focus{outline:none;border-color:var(--gold)}
.pin-error{color:var(--red);font-size:.76rem;text-align:center;min-height:18px;margin-top:-10px;margin-bottom:8px}
.pin-change{font-size:.73rem;color:var(--muted);text-align:center;margin-top:10px}
.pin-change a{color:var(--gold);cursor:pointer;text-decoration:underline}

/* ── PRINT STYLES ── */
@media print{
  body{background:#fff!important;color:#111!important}
  header,.tab-bar-wrap,.section-hdr,.card-footer,.mftr,
  .overlay:not(#printOverlay),.toast{display:none!important}
  #printOverlay{display:block!important;position:static;background:#fff;padding:0}
  .modal{border:none;max-width:100%;box-shadow:none;background:#fff}
  .mhdr,.mx{display:none!important}
  .mbody{padding:0}
  .view-name{color:#111;font-size:1.5rem}
  .view-meta{color:#444}
  .view-meta b{color:#111}
  .vsec h3{color:#111;border-bottom:1px solid #ccc;padding-bottom:3px}
  .ing-list li,.step-list li{border-color:#ddd;color:#111}
  .ing-amt{color:#111}
  .step-list li::before{background:#111;color:#fff}
  .view-note{background:#f9f6f0;border-left:2px solid #c9a84c;color:#444}
  .view-cols{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<header>
  <div class="hdr">
    <div class="brand">
      <div class="brand-logo">🍹</div>
      <div class="brand-text">
        <h1>Aqui Cal-Mex Bar Recipes</h1>
        <p>Campbell · Recipe Database</p>
      </div>
    </div>
    <div class="hdr-actions">
      <button class="btn btn-gold" id="addRecipeBtn" onclick="openAdd()" style="display:none">＋ Add Recipe</button>
      <button class="btn btn-outline" onclick="exportJSON()">⬇ Export</button>
      <label class="btn btn-ghost" style="cursor:pointer">⬆ Import<input type="file" accept=".json" style="display:none" onchange="importJSON(event)"></label>
      <button class="lock-btn" id="lockBtn" onclick="toggleAdmin()" title="Admin login">🔒 Admin</button>
    </div>
  </div>
</header>

<!-- TABS -->
<div class="tab-bar-wrap">
  <div class="tab-bar" id="tabBar"></div>
</div>

<div class="main">
  <div class="section-hdr">
    <div class="section-hdr-left">
      <div>
        <div class="section-title" id="sectionTitle"></div>
        <div class="section-sub" id="sectionSub"></div>
      </div>
      <div class="search-wrap">
        <span class="s-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search…" oninput="render()">
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline" id="printSectionBtn" onclick="printSection()">🖨 Print Section</button>
    </div>
  </div>
  <div class="grid" id="grid"></div>
</div>

<!-- VIEW MODAL -->
<div class="overlay" id="viewOverlay" onclick="closeIfBg(event,'viewOverlay')">
  <div class="modal">
    <div class="mhdr"><h2>Recipe Detail</h2><button class="mx" onclick="closeView()">✕</button></div>
    <div class="mbody" id="viewBody"></div>
    <div class="mftr" id="viewFtr"></div>
  </div>
</div>

<!-- EDIT/ADD MODAL -->
<div class="overlay" id="editOverlay" onclick="closeIfBg(event,'editOverlay')">
  <div class="modal">
    <div class="mhdr"><h2 id="editTitle">Add Recipe</h2><button class="mx" onclick="closeEdit()">✕</button></div>
    <div class="mbody">
      <div class="fg">
        <label>Recipe Name</label>
        <input type="text" id="eName" placeholder="e.g. 16oz - Classico Rocks">
      </div>
      <div class="fg-row">
        <div class="fg">
          <label>Category</label>
          <select id="eCat">
            <option value="Top Shelf Margaritas">Top Shelf Margaritas</option>
            <option value="Blended Margaritas">Blended Margaritas</option>
            <option value="HM Craft Swirls">HM Craft Swirls</option>
            <option value="Martinis">Martinis</option>
            <option value="Specialty Drinks">Specialty Drinks</option>
            <option value="Non-Alcoholic">Non-Alcoholic</option>
          </select>
        </div>
        <div class="fg">
          <label>Yields</label>
          <input type="text" id="eYields" placeholder="e.g. 7.5 fl oz / 1 Serving">
        </div>
      </div>
      <div class="fg-row">
        <div class="fg">
          <label>Allergens</label>
          <input type="text" id="eAllergens" placeholder="None">
        </div>
        <div class="fg">
          <label>Equipment</label>
          <input type="text" id="eEquip" placeholder="e.g. Metal Shaker, 16 oz glass">
        </div>
      </div>
      <div class="fg">
        <label>Ingredients</label>
        <div class="ie">
          <div class="ie-hdr"><span>Amount</span><span>Unit</span><span>Ingredient</span><span></span></div>
          <div id="ingRows"></div>
          <button class="ie-add" onclick="addIng()">＋ Add Ingredient</button>
        </div>
      </div>
      <div class="fg">
        <label>Instructions</label>
        <div class="se">
          <div id="stepRows"></div>
          <button class="se-add" onclick="addStep()">＋ Add Step</button>
        </div>
      </div>
      <div class="fg">
        <label>Notes (optional)</label>
        <textarea id="eNotes" placeholder="Any additional notes…"></textarea>
      </div>
    </div>
    <div class="mftr">
      <button class="btn btn-ghost" onclick="closeEdit()">Cancel</button>
      <button class="btn btn-red" id="deleteBtn" onclick="deleteRecipe()" style="display:none">Delete</button>
      <button class="btn btn-gold" onclick="saveRecipe()">Save Recipe</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- PIN MODAL -->
<div class="overlay" id="pinOverlay" onclick="closeIfBg(event,'pinOverlay')">
  <div class="pin-modal">
    <div class="mhdr">
      <span class="pin-title">🔒 Admin Login</span>
      <button class="mx" onclick="document.getElementById('pinOverlay').classList.remove('open')">✕</button>
    </div>
    <div class="mbody">
      <div class="pin-input-wrap">
        <input type="password" id="pinInput" maxlength="8" placeholder="••••"
          onkeydown="if(event.key==='Enter')submitPin()">
      </div>
      <div class="pin-error" id="pinError"></div>
      <div style="display:flex;gap:8px;justify-content:center">
        <button class="btn btn-ghost" onclick="document.getElementById('pinOverlay').classList.remove('open')">Cancel</button>
        <button class="btn btn-gold" onclick="submitPin()">Unlock</button>
      </div>
      <div class="pin-change" id="pinChangeRow" style="display:none">
        <a onclick="showChangePinUI()">Change PIN</a>
      </div>
      <div id="changePinUI" style="display:none;margin-top:14px">
        <div class="fg"><label>New PIN</label><input type="password" id="newPin1" maxlength="8" placeholder="New PIN"></div>
        <div class="fg"><label>Confirm New PIN</label><input type="password" id="newPin2" maxlength="8" placeholder="Confirm"></div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:6px">
          <button class="btn btn-ghost btn-sm" onclick="document.getElementById('changePinUI').style.display='none'">Cancel</button>
          <button class="btn btn-gold btn-sm" onclick="saveNewPin()">Save PIN</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════════
   CATEGORIES
════════════════════════════════════════ */

  'Top Shelf Margaritas',

  {

  {

      {amount:'2',  unit:'fl oz',     item:'Tequila - Herradura Silver'},

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
let recipes = [];
let activeTab = CATS[0];
let editingId = null;

function loadData(){
  try{
    const s = localStorage.getItem('aqui_v4');
    recipes = s ? JSON.parse(s) : JSON.parse(JSON.stringify(SEED));
  }catch(e){ recipes = JSON.parse(JSON.stringify(SEED)); }
}
function saveData(){ localStorage.setItem('aqui_v4', JSON.stringify(recipes)); }
function nextId(){ return recipes.length ? Math.max(...recipes.map(r=>r.id))+1 : 1; }

/* ════════════════════════════════════════
   TABS
════════════════════════════════════════ */
function buildTabs(){
  const bar = document.getElementById('tabBar');
  bar.innerHTML = CATS.map(c=>{
    const cnt = recipes.filter(r=>r.category===c).length;
    return `<button class="tab${c===activeTab?' active':''}" onclick="switchTab('${c}')">
      ${c}<span class="cnt">${cnt}</span>
    </button>`;
  }).join('');
}

function switchTab(cat){
  activeTab = cat;
  document.getElementById('searchInput').value = '';
  buildTabs();
  render();
}

/* ════════════════════════════════════════
   RENDER
════════════════════════════════════════ */
function stripPrefix(s){
  return s.replace(/^(Mix - |Liquor - |Vodka - |Tequila - |Rum - |Whiskey - |Cognac - |Juice - |Puree - |Agua Fresca - |Drinks - |Spice - )/,'');
}

function render(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = recipes.filter(r=>{
    if(r.category !== activeTab) return false;
    if(!q) return true;
    return r.name.toLowerCase().includes(q) ||
      r.ingredients.some(i=>i.item.toLowerCase().includes(q));
  }).sort((a,b)=>a.name.localeCompare(b.name));

  document.getElementById('sectionTitle').textContent = activeTab;
  document.getElementById('sectionSub').textContent =
    q ? `${list.length} result${list.length!==1?'s':''} for "${q}"` :
    `${list.length} recipe${list.length!==1?'s':''}`;

  const grid = document.getElementById('grid');
  if(!list.length){
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🍸</div>
      ${q ? `No recipes match "<b>${q}</b>"` : 'No recipes in this section yet.'}<br>
      <button class="btn btn-gold" style="margin-top:14px" onclick="openAdd()">＋ Add Recipe</button></div>`;
    return;
  }

  grid.innerHTML = list.map(r=>{
    const topIngs = r.ingredients.slice(0,3)
      .map(i=>`<span>${stripPrefix(i.item)}</span>`).join('');
    const more = r.ingredients.length>3
      ? `<span class="tag-more">+${r.ingredients.length-3}</span>` : '';
    return `<div class="card" onclick="viewRecipe(${r.id})">
      <div class="card-name">${r.name}</div>
      <div class="card-yield">Yields: ${r.yields}</div>
      <div class="card-ings">${topIngs}${more}</div>
      <div class="card-footer" onclick="event.stopPropagation()">
        <button class="btn btn-outline btn-sm" onclick="viewRecipe(${r.id})">View</button>
        <button class="btn btn-ghost btn-sm" onclick="printOne(${r.id})">🖨</button>
        ${adminUnlocked ? `<button class="btn btn-ghost btn-sm" onclick="openEdit(${r.id})">✏️ Edit</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

/* ════════════════════════════════════════
   VIEW
════════════════════════════════════════ */
function recipeHTML(r, forPrint=false){
  return `
    <div class="view-name">${r.name}</div>
    <div style="margin-bottom:10px;font-size:.72rem;color:${forPrint?'#555':'var(--muted)'};text-transform:uppercase;letter-spacing:.08em;font-weight:700">${r.category}</div>
    <div class="view-meta">
      <span>Yields: <b>${r.yields}</b></span>
      ${r.allergens?`<span>Allergens: <b>${r.allergens}</b></span>`:''}
      ${r.equipment?`<span>Equipment: <b>${r.equipment}</b></span>`:''}
    </div>
    <div class="view-cols">
      <div class="vsec">
        <h3>Ingredients</h3>
        <ul class="ing-list">
          ${r.ingredients.map(i=>`<li>
            <span class="ing-amt">${i.amount} ${i.unit}</span>
            <span>${i.item}</span>
          </li>`).join('')}
        </ul>
      </div>
      <div class="vsec">
        <h3>Instructions</h3>
        ${r.instructions.length
          ? `<ol class="step-list">${r.instructions.map(s=>`<li>${s}</li>`).join('')}</ol>`
          : '<p style="color:var(--muted);font-size:.82rem">No instructions recorded.</p>'
        }
      </div>
    </div>
    ${r.notes?`<div class="view-note">📝 <b>Note:</b> ${r.notes}</div>`:''}`;
}

function viewRecipe(id){
  const r = recipes.find(x=>x.id===id);
  if(!r) return;
  document.getElementById('viewBody').innerHTML = recipeHTML(r);
  document.getElementById('viewFtr').innerHTML = `
    <button class="btn btn-ghost" onclick="closeView()">Close</button>
    <button class="btn btn-ghost" onclick="printOne(${r.id})">🖨 Print</button>
    ${adminUnlocked ? `<button class="btn btn-outline" onclick="closeView();openEdit(${r.id})">✏️ Edit</button>` : ''}
  `;
  document.getElementById('viewOverlay').classList.add('open');
}
function closeView(){ document.getElementById('viewOverlay').classList.remove('open'); }

/* ════════════════════════════════════════
   PRINT — single recipe
════════════════════════════════════════ */
function printOne(id){
  const r = recipes.find(x=>x.id===id);
  if(!r) return;
  openPrintWindow([r], r.name);
}

/* ════════════════════════════════════════
   PRINT — whole section
════════════════════════════════════════ */
function printSection(){
  const list = recipes.filter(r=>r.category===activeTab).sort((a,b)=>a.name.localeCompare(b.name));
  if(!list.length){ showToast('No recipes in this section'); return; }
  openPrintWindow(list, activeTab);
}

  <div class="footer">
    <span>Aqui Cal-Mex Bar Recipes — ${title}</span>
    <span>Printed ${new Date().toLocaleDateString()}</span>
  </div>
  </body></html>`);
  win.document.close();
}

/* ════════════════════════════════════════
   ADD / EDIT
════════════════════════════════════════ */
function openAdd(){
  if(!adminUnlocked){ toggleAdmin(); return; }
  editingId = null;
  document.getElementById('editTitle').textContent = 'Add Recipe';
  document.getElementById('eName').value = '';
  document.getElementById('eCat').value = activeTab;
  document.getElementById('eYields').value = '';
  document.getElementById('eAllergens').value = '';
  document.getElementById('eEquip').value = '';
  document.getElementById('eNotes').value = '';
  document.getElementById('deleteBtn').style.display = 'none';
  buildIngRows([{amount:'',unit:'fl oz',item:''}]);
  buildStepRows(['']);
  document.getElementById('editOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('eName').focus(),80);
}

function openEdit(id){
  if(!adminUnlocked){ toggleAdmin(); return; }
  const r = recipes.find(x=>x.id===id);
  if(!r) return;
  editingId = id;
  document.getElementById('editTitle').textContent = 'Edit Recipe';
  document.getElementById('eName').value = r.name;
  document.getElementById('eCat').value = r.category;
  document.getElementById('eYields').value = r.yields;
  document.getElementById('eAllergens').value = r.allergens||'';
  document.getElementById('eEquip').value = r.equipment||'';
  document.getElementById('eNotes').value = r.notes||'';
  document.getElementById('deleteBtn').style.display = '';
  buildIngRows(r.ingredients.length ? r.ingredients : [{amount:'',unit:'fl oz',item:''}]);
  buildStepRows(r.instructions.length ? r.instructions : ['']);
  document.getElementById('editOverlay').classList.add('open');
}
function closeEdit(){ document.getElementById('editOverlay').classList.remove('open'); }

/* ingredient rows */
function buildIngRows(ings){
  document.getElementById('ingRows').innerHTML = ings.map((i,idx)=>`
    <div class="ir">
      <input type="text" value="${x(i.amount)}" placeholder="2">
      <input type="text" value="${x(i.unit)}"   placeholder="fl oz">
      <input type="text" value="${x(i.item)}"   placeholder="Ingredient…">
      <button class="rm" onclick="rmIng(${idx})">✕</button>
    </div>`).join('');
}
function addIng(){
  const rows = getIngs(); rows.push({amount:'',unit:'fl oz',item:''});
  buildIngRows(rows);
  document.getElementById('ingRows').lastElementChild.querySelectorAll('input')[2].focus();
}
function rmIng(idx){
  const r = getIngs(); r.splice(idx,1);
  buildIngRows(r.length?r:[{amount:'',unit:'fl oz',item:''}]);
}
function getIngs(){
  return [...document.getElementById('ingRows').querySelectorAll('.ir')].map(row=>{
    const i = row.querySelectorAll('input');
    return {amount:i[0].value, unit:i[1].value, item:i[2].value};
  });
}

/* step rows */
function buildStepRows(steps){
  document.getElementById('stepRows').innerHTML = steps.map((s,idx)=>`
    <div class="sr">
      <div class="snum">${idx+1}</div>
      <input type="text" value="${x(s)}" placeholder="Step ${idx+1}…">
      <button class="rm" onclick="rmStep(${idx})">✕</button>
    </div>`).join('');
}
function addStep(){
  const s = getSteps(); s.push('');
  buildStepRows(s);
  document.getElementById('stepRows').lastElementChild.querySelector('input').focus();
}
function rmStep(idx){
  const s = getSteps(); s.splice(idx,1);
  buildStepRows(s.length?s:['']);
}
function getSteps(){
  return [...document.getElementById('stepRows').querySelectorAll('input')].map(i=>i.value);
}

function x(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function saveRecipe(){
  const name = document.getElementById('eName').value.trim();
  if(!name){ showToast('Please enter a recipe name'); return; }
  const recipe = {
    id: editingId || nextId(),
    category: document.getElementById('eCat').value,
    name,
    yields: document.getElementById('eYields').value.trim(),
    allergens: document.getElementById('eAllergens').value.trim(),
    equipment: document.getElementById('eEquip').value.trim(),
    ingredients: getIngs().filter(i=>i.item.trim()),
    instructions: getSteps().filter(s=>s.trim()),
    notes: document.getElementById('eNotes').value.trim()
  };
  if(editingId){
    recipes[recipes.findIndex(r=>r.id===editingId)] = recipe;
    showToast('Recipe updated ✓');
  } else {
    recipes.push(recipe);
    showToast('Recipe added ✓');
  }
  saveData(); closeEdit(); buildTabs(); render();
}

function deleteRecipe(){
  if(!adminUnlocked || !editingId) return;
  const r = recipes.find(x=>x.id===editingId);
  if(!confirm(`Delete "${r.name}"? This cannot be undone.`)) return;
  recipes = recipes.filter(x=>x.id!==editingId);
  saveData(); closeEdit(); buildTabs(); render();
  showToast('Recipe deleted');
}

/* ════════════════════════════════════════
   ADMIN LOCK
════════════════════════════════════════ */
let adminUnlocked = false;
const PIN_KEY = 'aqui_admin_pin';

function getPin(){ return localStorage.getItem(PIN_KEY) || '1234'; }

function toggleAdmin(){
  if(adminUnlocked){
    adminUnlocked = false;
    updateAdminUI();
    buildTabs(); render();
    showToast('Admin locked 🔒');
  } else {
    document.getElementById('pinInput').value = '';
    document.getElementById('pinError').textContent = '';
    document.getElementById('changePinUI').style.display = 'none';
    document.getElementById('pinChangeRow').style.display = 'none';
    document.getElementById('pinOverlay').classList.add('open');
    setTimeout(()=>document.getElementById('pinInput').focus(), 80);
  }
}

function submitPin(){
  const val = document.getElementById('pinInput').value;
  if(val === getPin()){
    adminUnlocked = true;
    document.getElementById('pinOverlay').classList.remove('open');
    document.getElementById('pinChangeRow').style.display = '';
    updateAdminUI();
    buildTabs(); render();
    showToast('Admin unlocked 🔓');
  } else {
    document.getElementById('pinError').textContent = 'Incorrect PIN — try again';
    document.getElementById('pinInput').value = '';
    document.getElementById('pinInput').focus();
  }
}

function updateAdminUI(){
  const btn = document.getElementById('lockBtn');
  const addBtn = document.getElementById('addRecipeBtn');
  if(adminUnlocked){
    btn.textContent = '🔓 Admin';
    btn.classList.add('unlocked');
    addBtn.style.display = '';
  } else {
    btn.textContent = '🔒 Admin';
    btn.classList.remove('unlocked');
    addBtn.style.display = 'none';
  }
}

function showChangePinUI(){
  document.getElementById('changePinUI').style.display = '';
  document.getElementById('newPin1').value = '';
  document.getElementById('newPin2').value = '';
  document.getElementById('newPin1').focus();
}

function saveNewPin(){
  const p1 = document.getElementById('newPin1').value;
  const p2 = document.getElementById('newPin2').value;
  if(!p1){ showToast('Enter a new PIN'); return; }
  if(p1 !== p2){ showToast('PINs do not match'); return; }
  localStorage.setItem(PIN_KEY, p1);
  document.getElementById('changePinUI').style.display = 'none';
  showToast('PIN updated ✓');
}

/* ════════════════════════════════════════
   IMPORT / EXPORT
════════════════════════════════════════ */
function exportJSON(){
  const blob = new Blob([JSON.stringify(recipes,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `aqui-recipes-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast('Recipes exported ✓');
}
function importJSON(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    try{
      const data = JSON.parse(ev.target.result);
      if(!Array.isArray(data)) throw new Error();
      if(confirm(`Import ${data.length} recipes? This replaces the current database.`)){
        recipes = data; saveData(); buildTabs(); render();
        showToast(`Imported ${data.length} recipes ✓`);
      }
    }catch(e){ showToast('Import failed — invalid JSON file'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

/* ════════════════════════════════════════
   UTILITIES
════════════════════════════════════════ */
function closeIfBg(e,id){ if(e.target.id===id) document.getElementById(id).classList.remove('open'); }
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    document.getElementById('viewOverlay').classList.remove('open');
    document.getElementById('editOverlay').classList.remove('open');
    document.getElementById('pinOverlay').classList.remove('open');
  }
});

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
function init(){
  loadData();
  buildTabs();
  render();
}
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
